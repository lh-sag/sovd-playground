name: CI

on:
  pull_request:
  pull_request_target:
  workflow_call:
    inputs:
      rust_version:
        description: 'Rust toolchain version to use'
        required: false
        type: string
        default: '1.91.1'
    outputs:
      run_id:
        description: 'Workflow run ID for downloading artifacts'
        value: ${{ jobs.gate.outputs.run_id }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  PYTHON_VERSION: 3.13
  PRE_COMMIT_VERSION: 4.2
  COV_VERSION: 0.6.15
  RUST_VERSION: 1.91.1
  GIT_CLIFF_VERSION: 2.10.1

jobs:
  pre-commit:
    name: Pre-commit checks
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup uv
        id: setup-uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          activate-environment: true
          enable-cache: true
          prune-cache: false
          cache-dependency-glob: |
            .github/workflows/ci.yaml
            .pre-commit-config.yaml
      - name: Install pre-commit (if not cached)
        if: steps.setup-uv.outputs.cache-hit != 'true'
        run: uv tool install pre-commit@${{ env.PRE_COMMIT_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ env.PYTHON_VERSION }}-${{ hashFiles('.pre-commit-config.yaml') }}
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust_version || env.RUST_VERSION }}
          components: rustfmt, clippy
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: pre-commit
      - name: Run pre-commit
        run: uv tool run pre-commit run --all-files --show-diff-on-failure

  validate-labeler:
    name: Validate labeler configuration
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Check labeler configuration
        run: scripts/check-labeler.sh

  label:
    name: Auto-label pull requests
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run labeler
        uses: actions/labeler@v6

  build:
    needs: [pre-commit, validate-labeler]
    name: Build and test (${{ matrix.os }}, ${{ matrix.profile }})
    timeout-minutes: 10
    strategy:
      matrix:
        os: [ubuntu-24.04, windows-2025, macos-15] # ubuntu-24.04-arm, windows-2025-arm
        profile: [release]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup OpenSSL (Windows) Environment
        if: runner.os == 'Windows'
        run: |
          echo "OPENSSL_DIR=$env:OPENSSL_DIR" >> $env:GITHUB_ENV
          echo "OPENSSL_LIB_DIR=$env:OPENSSL_DIR\lib\VC\$env:RUNNER_ARCH\MD" >> $env:GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$env:OPENSSL_DIR\include" >> $env:GITHUB_ENV
        env:
          OPENSSL_DIR: C:\Program Files\OpenSSL
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust_version || env.RUST_VERSION }}
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ci-${{ matrix.os }}
      - name: Get Rust target triple
        id: target
        run: rustc -vV | grep host | awk '{print "triple=" $2}' >> $GITHUB_OUTPUT
        shell: bash
      - name: Build
        run: cargo build --locked --workspace --all-targets --all-features --profile ${{ matrix.profile }}
      - name: Test
        run: cargo test --locked --workspace --all-targets --all-features --profile ${{ matrix.profile }}
      - name: Doc test
        run: cargo test --locked --workspace --doc --all-features --profile ${{ matrix.profile }}
      - name: Rename binary with target triple
        run: |
          BINARY_NAME="sovd-gateway-${{ steps.target.outputs.triple }}${{ runner.os == 'Windows' && '.exe' || '' }}"
          SOURCE_PATH="target/${{ matrix.profile }}/sovd-gateway${{ runner.os == 'Windows' && '.exe' || '' }}"
          if [ -f "$SOURCE_PATH" ]; then
            mv "$SOURCE_PATH" "target/${{ matrix.profile }}/$BINARY_NAME"
            echo "Renamed binary to: $BINARY_NAME"
          else
            echo "Warning: Source binary not found at $SOURCE_PATH"
            ls -la target/${{ matrix.profile }}/
          fi
        shell: bash
      - name: Upload sovd-gateway binary
        uses: actions/upload-artifact@v4
        with:
          name: sovd-gateway-${{ steps.target.outputs.triple }}-${{ matrix.profile }}
          path: |
            target/${{ matrix.profile }}/sovd-gateway-${{ steps.target.outputs.triple }}${{ runner.os == 'Windows' && '.exe' || '' }}
          if-no-files-found: error
          retention-days: 5

  integration-tests:
    name: Python Integration Tests (${{ matrix.os }}, ${{ matrix.profile }})
    needs: build
    timeout-minutes: 10
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
        profile: [release]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Get target triple for artifact name
        id: target
        run: |
          case "${{ runner.os }}" in
            Linux) echo "triple=x86_64-unknown-linux-gnu" ;;
            macOS) echo "triple=aarch64-apple-darwin" ;;
            Windows) echo "triple=x86_64-pc-windows-msvc" ;;
          esac >> $GITHUB_OUTPUT
        shell: bash
      - name: Download sovd-gateway binary
        uses: actions/download-artifact@v4
        with:
          name: sovd-gateway-${{ steps.target.outputs.triple }}-${{ matrix.profile }}
          path: ./binaries
      - name: Make binary executable (Unix)
        if: runner.os != 'Windows'
        run: chmod +x ./binaries/sovd-gateway-${{ steps.target.outputs.triple }}
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          activate-environment: true
          enable-cache: true
          prune-cache: false
      - name: Install Python dependencies
        run: uv sync --locked
      - name: Get Playwright cache directory
        id: playwright-cache
        run: |
          case "${{ runner.os }}" in
            Linux) echo "path=/home/runner/.cache/ms-playwright" ;;
            macOS) echo "path=/Users/runner/Library/Caches/ms-playwright" ;;
            Windows) echo "path=C:\\Users\\runneradmin\\AppData\\Local\\ms-playwright" ;;
          esac >> $GITHUB_OUTPUT
        shell: bash
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ${{ steps.playwright-cache.outputs.path }}
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - name: Install Playwright browsers
        run: uv run playwright install chromium --with-deps
      - name: Run pytest with pre-built binary
        run: |
          uv run pytest -v -s --sovd-gateway-bin=./binaries/sovd-gateway-${{ steps.target.outputs.triple }}${{ runner.os == 'Windows' && '.exe' || '' }}

  gate:
    name: CI Gate
    needs: [pre-commit, validate-labeler, build, integration-tests]
    runs-on: ubuntu-24.04
    outputs:
      run_id: ${{ github.run_id }}
    steps:
      - run: echo "CI checks passed!"
