name: Build

on:
  push:
    branches: [main]

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yaml
    permissions:
      contents: read
      actions: read
      pull-requests: write

  release:
    name: Create latest release
    needs: ci
    uses: ./.github/workflows/release.yaml
    permissions:
      contents: write
      actions: read
    with:
      release_tag: latest
      release_title: Latest Development Build
      run_id: ${{ needs.ci.outputs.run_id }}

  docker-publish:
    name: Build and push Docker image
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Linux x86_64 binary artifact
        uses: actions/download-artifact@v4
        with:
          name: sovd-gateway-x86_64-unknown-linux-gnu-release
          path: ./docker-build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=main-
          labels: |
            org.opencontainers.image.title=SOVD Gateway
            org.opencontainers.image.description=SOVD Playground - ISO 17978-3 Service-Oriented Vehicle Diagnostics gateway server
            org.opencontainers.image.vendor=Liebherr-Digital Development Center GmbH
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.documentation=${{ github.server_url }}/${{ github.repository }}/blob/main/README.md

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
