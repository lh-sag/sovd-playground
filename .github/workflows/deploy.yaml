name: Deploy

on:
  workflow_call:
    inputs:
      release_tag:
        description: 'Release tag name'
        required: true
        type: string
      release_title:
        description: 'Release title'
        required: true
        type: string
      run_id:
        description: 'Workflow run ID to download artifacts from'
        required: true
        type: string

env:
  GIT_CLIFF_VERSION: 2.10.1

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff@${{ env.GIT_CLIFF_VERSION }}

      - name: Download CI artifacts
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ inputs.run_id }}
          path: release-assets

      - name: Prepare release assets
        run: |
          cd release-assets
          for zip_file in *.zip; do
            [ -f "$zip_file" ] || continue
            unzip -o "$zip_file"
            rm "$zip_file"
          done
          find . -type f \( -name "sovd-gateway-*" -o -name "sovd-gateway" -o -name "sovd-gateway.exe" \) | while read -r binary; do
            [ "$binary" != "./$(basename "$binary")" ] && mv "$binary" "./$(basename "$binary")"
          done
          find . -type d -empty -delete

      - name: Generate changelog
        run: git-cliff --unreleased --output CHANGELOG.md

      - name: Create or update release
        run: |
          TAG="${{ inputs.release_tag }}"
          PRERELEASE=$([[ "$TAG" =~ ^v[0-9] ]] && echo "" || echo "--prerelease")

          if [[ ! "$TAG" =~ ^v[0-9] ]]; then
            gh release view "$TAG" >/dev/null 2>&1 && gh release delete "$TAG" --yes
            git tag -l | grep -q "^${TAG}$" && git push --delete origin "$TAG" || true
          fi

          gh release create "$TAG" \
            --title "${{ inputs.release_title }}" \
            --notes-file CHANGELOG.md \
            --target "${{ github.sha }}" \
            $PRERELEASE \
            release-assets/*
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update tag
        run: |
          TAG="${{ inputs.release_tag }}"
          if [[ ! "$TAG" =~ ^v[0-9] ]]; then
            git tag -f "$TAG"
            git push origin "$TAG" --force
          fi

  docker-publish:
    name: Build and push Docker image
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Linux binary artifacts
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ inputs.run_id }}
          pattern: sovd-gateway-*-linux-gnu-release
          path: ./docker-build
          merge-multiple: true

      - name: Prepare binaries for Docker
        run: |
          mv ./docker-build/sovd-gateway-x86_64-unknown-linux-gnu ./docker-build/sovd-gateway-amd64
          mv ./docker-build/sovd-gateway-aarch64-unknown-linux-gnu ./docker-build/sovd-gateway-arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/sovd-gateway
          tags: type=raw,value=${{ inputs.release_tag }}
          labels: |
            org.opencontainers.image.title=SOVD Gateway
            org.opencontainers.image.description=SOVD Playground - ISO 17978-3 Service-Oriented Vehicle Diagnostics
            org.opencontainers.image.vendor=Liebherr-Digital Development Center GmbH
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          platforms: linux/amd64
          tags: sovd-gateway:test
          build_args: TARGETARCH=amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker run -d --name test -p 9000:9000 sovd-gateway:test
          sleep 3
          COMMIT=$(git rev-parse --short HEAD)
          VERSION=$(curl -s http://localhost:9000/sovd/version-info | jq -r '.sovd_info[0].vendor_info.version')
          docker stop test && docker rm test
          [[ "$VERSION" == *"$COMMIT"* ]] || exit 1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
